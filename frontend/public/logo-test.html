<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Image Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FAFAF8] p-10 flex flex-col items-center space-y-12">
  <h1 class="text-2xl font-black text-[#111827]">FinTrack AI Uploaded Image Assets Test</h1>

  <div class="flex flex-col gap-8 items-center">
    
    <!-- Monogram Image Card -->
    <div class="bg-white p-6 rounded-3xl border border-[#E5E7EB] flex flex-col items-center space-y-4 shadow-sm">
      <span class="text-xs font-bold text-gray-400">Monogram Asset (logo_monogram.png)</span>
      <img src="/logo_monogram.png" alt="Monogram" class="w-[150px] h-[150px] object-contain rounded-[24%]" />
    </div>

    <!-- Horizontal Logo Card -->
    <div class="bg-white p-6 rounded-3xl border border-[#E5E7EB] flex flex-col items-center space-y-4 shadow-sm w-full max-w-2xl">
      <span class="text-xs font-bold text-gray-400">Horizontal Logo Asset (logo_horizontal.png)</span>
      <div class="border border-red-200 bg-red-50/10 p-2 rounded-xl">
        <img src="/logo_horizontal.png" alt="Horizontal Logo" class="h-16 object-contain" />
      </div>
      <p class="text-xs text-gray-400">Red border shows the image bounding box with whitespace.</p>
    </div>

  </div>
</body>
</html>
