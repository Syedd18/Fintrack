<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Comparison</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FAFAF8] p-10 flex flex-col items-center space-y-12">
  <h1 class="text-2xl font-black text-[#111827]">FinTrack AI SVG Logo Prototypes</h1>

  <!-- Container for side-by-side comparison -->
  <div class="flex flex-wrap gap-8 justify-center">

    <!-- Prototype 1 -->
    <div class="bg-white p-6 rounded-3xl border border-[#E5E7EB] flex flex-col items-center space-y-4 shadow-sm">
      <span class="text-xs font-bold text-gray-400">Prototype 1 (Smooth Bezier)</span>
      <svg width="150" height="150" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Main F-wing -->
        <path d="M 28,75 C 22,62 21,42 41,27 C 55,16 78,14 88,14 C 74,21 54,29 46,42 C 43,47 43,51 43,53 C 43,53 58,49 76,49 C 64,55 50,58 43,60 C 41,63 37,69 33,72 C 31,74 29,75 28,75 Z" fill="#111827" />
        <!-- Gold dot -->
        <circle cx="72" cy="38" r="7" fill="#C9A76A" />
        <!-- Green dot -->
        <circle cx="28" cy="86" r="7" fill="#A8B5A2" />
      </svg>
    </div>

    <!-- Prototype 2 -->
    <div class="bg-white p-6 rounded-3xl border border-[#E5E7EB] flex flex-col items-center space-y-4 shadow-sm">
      <span class="text-xs font-bold text-gray-400">Prototype 2 (Feathered Wing)</span>
      <svg width="150" height="150" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Let's adjust curves:
             Top wing is bolder, sweeps up higher.
             Middle wing points right-up.
             Bottom curves down-left, tapering nicely. -->
        <path d="M 27,72 
                 C 21,60 21,40 43,24 
                 C 58,13 82,12 92,12 
                 C 78,19 55,27 47,40 
                 C 44,45 44,48 44,51 
                 C 44,51 60,47 78,47 
                 C 66,53 52,56 45,58 
                 C 43,61 38,67 33,70 
                 C 31,72 29,72 27,72 Z" fill="#111827" />
        <!-- Gold dot nestled in the crook of the top and middle swoops -->
        <circle cx="74" cy="36" r="6" fill="#C9A76A" />
        <!-- Green dot nestled under the bottom curve -->
        <circle cx="28" cy="82" r="6.5" fill="#A8B5A2" />
      </svg>
    </div>

    <!-- Prototype 3 -->
    <div class="bg-white p-6 rounded-3xl border border-[#E5E7EB] flex flex-col items-center space-y-4 shadow-sm">
      <span class="text-xs font-bold text-gray-400">Prototype 3 (Refined Curves & Gaps)</span>
      <svg width="150" height="150" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Let's refine the shape:
             - Top swoop curves up and right, thick in the middle, thin at the tip.
             - Left backbone is smooth and convex.
             - Middle branch is a clean taper.
             - Bottom stem is convex left. -->
        <path d="M 28,70 
                 C 23,60 21,43 38,26 
                 C 51,14 78,11 88,11 
                 C 74,17 52,26 44,38 
                 C 41,43 41,47 41,50 
                 C 41,50 56,46 74,46 
                 C 62,51 49,54 42,56 
                 C 40,59 36,65 32,68 
                 C 30,70 29,70 28,70 Z" fill="#111827" />
        <circle cx="74" cy="34" r="6.5" fill="#C9A76A" />
        <circle cx="28" cy="80" r="7" fill="#A8B5A2" />
      </svg>
    </div>

  </div>
</body>
</html>
