name: FinTrack AI CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build & Verify Backend
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Backend Unit & Integration Tests
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw clean test

  # Job 2: Build & Verify Frontend
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies & run checks
      run: |
        cd frontend
        npm install
        npm run lint --if-present

  # Job 3: Build Docker images and Publish to Hub
  docker-publish:
    needs: [backend-test, frontend-lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/fintrack-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/fintrack-backend:${{ github.sha }}

    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/fintrack-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/fintrack-frontend:${{ github.sha }}

  # Job 4: Auto Deploy via SSH Triggers or Webhook
  deploy-production:
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Trigger Server Auto-Update
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.AWS_SSH_HOST }}
        username: ec2-user
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        script: |
          cd /opt/fintrack-ai/devops
          docker-compose pull
          docker-compose up -d --remove-orphans
          docker image prune -f
