version: '3.8'

services:
  # 1. Primary Database Service
  db:
    image: postgres:16-alpine
    container_name: fintrack-db
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintrack"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrack-network

  # 2. Redis Cache Service
  cache:
    image: redis:7-alpine
    container_name: fintrack-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fintrack-network

  # 3. Spring Boot Backend Service
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fintrack-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/fintrack
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-407A4672567834981273918237192837192837192837192837192837192837192837192837192837192837192837192}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - fintrack-network

  # 4. Next.js 15 Frontend Service
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: fintrack-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    networks:
      - fintrack-network

  # 5. Reverse Proxy Gateway
  nginx:
    image: nginx:alpine
    container_name: fintrack-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - fintrack-network

  # 6. Observability scrapers
  prometheus:
    image: prom/prometheus:latest
    container_name: fintrack-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - fintrack-network

  # 7. Visualization dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: fintrack-grafana
    ports:
      - "3001:3000" # Change host port to 3001 to prevent conflict with frontend
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - fintrack-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  fintrack-network:
    driver: bridge
