events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting zone for API Webhook inputs
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=5r/s;

    server {
        listen 80;
        server_name localhost;

        # 1. API requests routing to backend
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Swagger docs routing to backend
        location /swagger-ui/ {
            proxy_pass http://backend:8080/swagger-ui/;
            proxy_set_header Host $host;
        }

        location /v3/api-docs/ {
            proxy_pass http://backend:8080/v3/api-docs/;
            proxy_set_header Host $host;
        }

        # 3. Rate-limited incoming SMS webhook endpoint
        location /api/v1/webhook/sms {
            limit_req zone=webhook_limit burst=10 nodelay;
            proxy_pass http://backend:8080/api/v1/webhook/sms;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. Frontend static assets and server route matching
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
